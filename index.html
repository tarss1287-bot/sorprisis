<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Hamburguesa, Anyid?</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            overflow: hidden;
            position: relative;
        }
        .container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,255,255,0.5); 
            text-align: center; 
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }
        h1 {
            color: #ff4757;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .buttons { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            align-items: center;
            position: relative;
            min-height: 60px;
        }
        button { 
            padding: 15px 35px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: 600; 
            font-family: 'Outfit', sans-serif;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }
        #yesBtn { 
            background: linear-gradient(135deg, #2ed573, #7bed9f); 
            color: white; 
            box-shadow: 0 10px 20px rgba(46, 213, 115, 0.3);
            z-index: 2;
        }
        #yesBtn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 25px rgba(46, 213, 115, 0.4);
        }
        #noBtn { 
            background: linear-gradient(135deg, #ff4757, #ff6b81); 
            color: white; 
            position: absolute; 
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
            z-index: 3;
            left: calc(50% + 20px);
        }
        
        .success-content {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .success-content h1 {
            margin-bottom: 10px;
        }
        .success-content p {
            font-size: 1.2rem;
            color: #555;
            font-weight: 600;
        }
        
        /* Floating background elements */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            z-index: 1;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<!-- Floating shapes for background -->
<div class="bg-shape" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
<div class="bg-shape" style="width: 200px; height: 200px; bottom: 50px; right: -50px;"></div>
<div class="bg-shape" style="width: 150px; height: 150px; bottom: -50px; left: 20%;"></div>

<div class="container" id="mainBox">
    <div id="ask-content">
        <h1>Anyid, ¿me invitas a una hamburguesa? 🍔</h1>
        <div class="buttons">
            <button id="yesBtn">¡Claro que sí!</button>
            <button id="noBtn">No</button>
        </div>
    </div>
    
    <div id="success-content" class="success-content">
        <h1>¡Sabía que eres la mejor! 🥳🍔</h1>
        <p>¡Te quiero, vvsita!</p>
        <div style="font-size: 5rem; margin-top: 10px;">💖🍔</div>
    </div>
</div>

<script>
    // Animations on load
    gsap.from(".bg-shape", {
        y: 50,
        opacity: 0,
        duration: 1.5,
        stagger: 0.2,
        ease: "power3.out"
    });
    
    gsap.from("#mainBox", {
        scale: 0.8,
        opacity: 0,
        duration: 1,
        ease: "elastic.out(1, 0.5)",
        delay: 0.3
    });

    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const askContent = document.getElementById('ask-content');
    const successContent = document.getElementById('success-content');
    
    const phrases = [
        "¿Segura?", 
        "Piénsalo otra vez", 
        "¡No seas así balurda!", 
        "Me romperás el corazón", 
        "¡Eres cruel, tienes dias pa reunir!", 
        "¡Dame esa hamburguesa!",
        "¡Mírala pues!",
        "Anda di que sí 🥺"
    ];
    let index = 0;
    let noAttempts = 0;

    // Si dice que SÍ
    yesBtn.addEventListener('click', () => {
        // Confetti!
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff4757', '#2ed573', '#ff6b81', '#7bed9f', '#ffffff']
        });
        
        gsap.to(askContent, {
            opacity: 0,
            scale: 0.8,
            duration: 0.4,
            onComplete: () => {
                askContent.style.display = 'none';
                successContent.style.display = 'flex';
                gsap.fromTo(successContent, 
                    { opacity: 0, scale: 0.8 }, 
                    { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.5)" }
                );
            }
        });
    });

    // Si finalmente hace clic en NO (después de 5 intentos)
    noBtn.addEventListener('click', () => {
        if (noAttempts >= 5) {
            gsap.to(askContent, {
                opacity: 0,
                scale: 0.8,
                duration: 0.4,
                onComplete: () => {
                    askContent.style.display = 'none';
                    successContent.innerHTML = "<h1>Bueno, si no quieres, no 🥺</h1><p>Igual te quiero, vvsita</p><div style='font-size: 5rem; margin-top: 10px;'>💔</div>";
                    successContent.style.display = 'flex';
                    gsap.fromTo(successContent, 
                        { opacity: 0, scale: 0.8 }, 
                        { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.5)" }
                    );
                }
            });
        }
    });

    // El botón "No" se escapa
    noBtn.addEventListener('mouseover', () => {
        noAttempts++;
        
        // Si ya intentó 5 veces, dejamos que lo presione
        if (noAttempts > 5) {
            noBtn.innerText = "Bueno, dale click...";
            return; 
        }

        // Calculate safe boundaries
        const padding = 20;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;
        
        // Random position
        const newX = Math.max(padding, Math.random() * maxX);
        const newY = Math.max(padding, Math.random() * maxY);
        
        // Ensure the button is removed from the flex flow for absolute positioning to work smoothly everywhere
        noBtn.style.position = 'fixed';
        
        gsap.to(noBtn, { 
            left: newX + 'px', 
            top: newY + 'px', 
            duration: 0.3,
            ease: "power2.out"
        });
        
        if (index < phrases.length) {
            noBtn.innerText = phrases[index];
            index++;
        }
    });
</script>
</body>
</html>
