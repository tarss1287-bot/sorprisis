<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Quieres salir conmigo?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(-45deg, #f8a5c2, #f7d6e0, #c9b8f4, #a8d8ea);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Corazones flotantes decorativos */
        .heart-bg {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatUp linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
        }
        .container { 
            background: #f1f3f4; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 450px;
            width: 90%;
            z-index: 10;
            position: relative;
            overflow: hidden;
        }
        h1 {
            color: #7b6d70;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }
        .heart { color: #d63c4b; }
        .gif-container {
            margin: 0 auto 25px auto;
            width: 200px;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
        }
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .buttons { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            align-items: center;
            position: relative;
            min-height: 45px;
            margin-bottom: 15px;
        }
        button { 
            padding: 8px 30px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 800; 
            font-family: 'Nunito', sans-serif;
            transition: transform 0.1s ease;
        }
        #yesBtn { 
            background-color: #55b72e;
            color: white; 
            z-index: 2;
        }
        #yesBtn:hover {
            transform: scale(1.05);
        }
        #noBtn { 
            background-color: #c7372f; 
            color: white; 
            z-index: 3;
        }
        
        .footer-text {
            color: #d63c4b;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            min-height: 24px;
            transition: opacity 0.3s ease;
        }

        .success-content {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .success-content h1 {
            font-size: 1.6rem;
            margin-bottom: 15px;
        }
        .success-content p {
            font-size: 1.05rem;
            color: #7b6d70;
            font-weight: 600;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

<!-- Corazones flotantes de fondo -->
<div class="heart-bg" style="left:5%;  animation-duration:7s;  animation-delay:0s;">💖</div>
<div class="heart-bg" style="left:15%; animation-duration:9s;  animation-delay:1s;">🩷</div>
<div class="heart-bg" style="left:30%; animation-duration:6s;  animation-delay:3s;">💕</div>
<div class="heart-bg" style="left:50%; animation-duration:8s;  animation-delay:0.5s;">💗</div>
<div class="heart-bg" style="left:65%; animation-duration:10s; animation-delay:2s;">💖</div>
<div class="heart-bg" style="left:80%; animation-duration:7s;  animation-delay:4s;">🩷</div>
<div class="heart-bg" style="left:90%; animation-duration:9s;  animation-delay:1.5s;">💕</div>

<div class="container" id="mainBox">
    <div id="ask-content">
        <h1>¿Quieres invitarme a comer? <span class="heart">❤️</span></h1>
        
        <div class="gif-container">
            <img src="https://tse3.mm.bing.net/th/id/OIP.4_-TxTsQUu1Ggg_FwL1VigHaHH?r=0&pid=Api&h=220&P=0" alt="Ositos">
        </div>

        <div class="buttons">
            <button id="yesBtn">¡Sí!</button>
            <button id="noBtn">No</button>
        </div>
        
        <div class="footer-text" id="footerText">
            Estoy empezando a llorar...
        </div>
    </div>
    
    <div id="success-content" class="success-content">
        <h1>alimenta a esta muerta de hambre<span class="heart">❤️</span></h1>
        <div class="gif-container">
            <img src="https://tse3.mm.bing.net/th/id/OIP.XBaYYScp6qsbnar9gYGu4wHaHa?r=0&pid=Api&h=220&P=0" alt="Ositos caminando">
        </div>
        <p>Espero verte cuando tengas plata</p>
    </div>
</div>

<script>
    gsap.from("#mainBox", {
        scale: 0.9,
        opacity: 0,
        duration: 0.8,
        ease: "back.out(1.2)",
    });

    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const askContent = document.getElementById('ask-content');
    const successContent = document.getElementById('success-content');
    const footerText = document.getElementById('footerText');
    
    const phrases = [
        "Estoy empezando a llorar...", 
        "¿Por qué no? balurda 🥺", 
        "Piénsalo bien...", 
        "¡No me hagas esto!", 
        "¡Dale al verde!",
        "¿Segura segura?"
    ];
    let index = 0;
    let intentos = 0;
    let isMoving = false;

    // Si dice que SÍ
    yesBtn.addEventListener('click', () => {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ef4444', '#4ade80', '#ffffff']
        });
        
        gsap.to(askContent, {
            opacity: 0,
            scale: 0.9,
            duration: 0.3,
            onComplete: () => {
                askContent.style.display = 'none';
                successContent.style.display = 'flex';
                gsap.fromTo(successContent, 
                    { opacity: 0, scale: 0.9 }, 
                    { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.2)" }
                );
            }
        });
    });

    // Si finalmente hace clic en NO
    noBtn.addEventListener('click', () => {
        if (intentos >= 5) {
            gsap.to(askContent, {
                opacity: 0,
                scale: 0.9,
                duration: 0.3,
                onComplete: () => {
                    askContent.style.display = 'none';
                    successContent.innerHTML = "<h1>Bueno, está bien, de toda maneras me la debes🥺</h1><div class='gif-container'><img src='https://tse1.mm.bing.net/th/id/OIP.WNQ6I4EhfhpBcCHn7pVaOQHaHa?r=0&pid=Api&h=220&P=0' alt='sad'></div><p>Igual te quiero...</p>";
                    successContent.style.display = 'flex';
                    gsap.fromTo(successContent, 
                        { opacity: 0, scale: 0.9 }, 
                        { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.2)" }
                    );
                }
            });
        }
    });

    // El botón "No" se escapa (lógica simple y directa)
    noBtn.addEventListener('mouseenter', () => {
        if (intentos < 5) {
            // Mover el botón a una posición aleatoria dentro del contenedor
            const mainBox = document.getElementById('mainBox');
            const maxX = mainBox.clientWidth - noBtn.offsetWidth - 15;
            const maxY = mainBox.clientHeight - noBtn.offsetHeight - 15;

            const randomX = Math.max(10, Math.random() * maxX);
            const randomY = Math.max(10, Math.random() * maxY);

            noBtn.style.position = 'absolute';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            noBtn.style.margin = '0';
            
            // Mostrar texto de pie
            footerText.style.opacity = 1;
            if (index < phrases.length) {
                footerText.innerText = phrases[index];
                index++;
            }

            intentos++;
        } else {
            // Límite alcanzado: el botón ya no se mueve
            noBtn.style.position = 'static';
            footerText.style.opacity = 1;
            footerText.innerText = "Bueno, dale click si de verdad quieres...";
        }
    });
</script>
</body>
</html>
