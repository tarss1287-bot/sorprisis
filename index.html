<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Quieres salir conmigo?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Nunito', sans-serif; 
            background-color: #e5e7e9; /* Subtle grey like the photo */
            overflow: hidden;
            position: relative;
        }
        .container { 
            background: #f1f3f4; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 450px;
            width: 90%;
            z-index: 10;
            position: relative;
        }
        h1 {
            color: #7b6d70;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }
        .heart { color: #d63c4b; }
        .gif-container {
            margin: 0 auto 25px auto;
            width: 200px;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
        }
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .buttons { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            align-items: center;
            position: relative;
            min-height: 45px;
            margin-bottom: 15px;
        }
        button { 
            padding: 8px 30px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 800; 
            font-family: 'Nunito', sans-serif;
            transition: transform 0.1s ease;
        }
        #yesBtn { 
            background-color: #55b72e;
            color: white; 
            z-index: 2;
        }
        #yesBtn:hover {
            transform: scale(1.05);
        }
        #noBtn { 
            background-color: #c7372f; 
            color: white; 
            z-index: 3;
        }
        
        .footer-text {
            color: #d63c4b;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            min-height: 24px;
            transition: opacity 0.3s ease;
        }

        .success-content {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .success-content h1 {
            font-size: 1.6rem;
            margin-bottom: 15px;
        }
        .success-content p {
            font-size: 1.05rem;
            color: #7b6d70;
            font-weight: 600;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container" id="mainBox">
    <div id="ask-content">
        <h1>¿Quieres invitarme a comer? <span class="heart">❤️</span></h1>
        
        <div class="gif-container">
            <img src="https://tse3.mm.bing.net/th/id/OIP.4_-TxTsQUu1Ggg_FwL1VigHaHH?r=0&pid=Api&h=220&P=0" alt="Ositos">
        </div>

        <div class="buttons">
            <button id="yesBtn">¡Sí!</button>
            <button id="noBtn">No</button>
        </div>
        
        <div class="footer-text" id="footerText">
            Estoy empezando a llorar...
        </div>
    </div>
    
    <div id="success-content" class="success-content">
        <h1>alimenta a esta muerta de hambre<span class="heart">❤️</span></h1>
        <div class="gif-container">
            <img src="https://tse3.mm.bing.net/th/id/OIP.XBaYYScp6qsbnar9gYGu4wHaHa?r=0&pid=Api&h=220&P=0" alt="Ositos caminando">
        </div>
        <p>Espero verte cuando tengas plata</p>
    </div>
</div>

<script>
    gsap.from("#mainBox", {
        scale: 0.9,
        opacity: 0,
        duration: 0.8,
        ease: "back.out(1.2)",
    });

    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const askContent = document.getElementById('ask-content');
    const successContent = document.getElementById('success-content');
    const footerText = document.getElementById('footerText');
    
    const phrases = [
        "Estoy empezando a llorar...", 
        "¿Por qué no? balurda 🥺", 
        "Piénsalo bien...", 
        "¡No me hagas esto!", 
        "¡Dale al verde!",
        "¿Segura segura?"
    ];
    let index = 0;
    let intentos = 0;
    let isMoving = false;

    // Si dice que SÍ
    yesBtn.addEventListener('click', () => {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ef4444', '#4ade80', '#ffffff']
        });
        
        gsap.to(askContent, {
            opacity: 0,
            scale: 0.9,
            duration: 0.3,
            onComplete: () => {
                askContent.style.display = 'none';
                successContent.style.display = 'flex';
                gsap.fromTo(successContent, 
                    { opacity: 0, scale: 0.9 }, 
                    { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.2)" }
                );
            }
        });
    });

    // Si finalmente hace clic en NO
    noBtn.addEventListener('click', () => {
        if (intentos >= 5) {
            gsap.to(askContent, {
                opacity: 0,
                scale: 0.9,
                duration: 0.3,
                onComplete: () => {
                    askContent.style.display = 'none';
                    successContent.innerHTML = "<h1>Bueno, está bien, de toda maneras ni me querias🥺</h1><div class='gif-container'><img src='https://tse1.mm.bing.net/th/id/OIP.WNQ6I4EhfhpBcCHn7pVaOQHaHa?r=0&pid=Api&h=220&P=0' alt='sad'></div><p>Igual te quiero...</p>";
                    successContent.style.display = 'flex';
                    gsap.fromTo(successContent, 
                        { opacity: 0, scale: 0.9 }, 
                        { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.2)" }
                    );
                }
            });
        }
    });

    // El botón "No" se escapa
    noBtn.addEventListener('mouseenter', () => {
        if (isMoving) return;
        
        if (intentos < 5) {
            intentos++;
            
            // Mostrar texto de pie
            footerText.style.opacity = 1;
            if (index < phrases.length) {
                footerText.innerText = phrases[index];
                index++;
            }

            isMoving = true;
            const mainBox = document.getElementById('mainBox');

            // Convertir a position absolute relativa al contenedor principal
            if (noBtn.style.position !== 'absolute') {
                const boxRect = mainBox.getBoundingClientRect();
                const btnRect = noBtn.getBoundingClientRect();
                
                noBtn.style.position = 'absolute';
                noBtn.style.left = (btnRect.left - boxRect.left) + 'px';
                noBtn.style.top = (btnRect.top - boxRect.top) + 'px';
                noBtn.style.margin = '0';
            }

            // Generar posición aleatoria DENTRO del contenedor principal
            const padding = 15;
            const maxX = mainBox.clientWidth - noBtn.offsetWidth - padding;
            const maxY = mainBox.clientHeight - noBtn.offsetHeight - padding;
            
            const newX = Math.max(padding, Math.random() * maxX);
            const newY = Math.max(padding, Math.random() * maxY);
            
            gsap.to(noBtn, { 
                left: newX + 'px', 
                top: newY + 'px', 
                duration: 0.25,
                ease: "power2.out",
                onComplete: () => {
                    isMoving = false;
                }
            });
        } else {
            // Condición de límite (5 intentos)
            footerText.style.opacity = 1;
            footerText.innerText = "Bueno, dale click si de verdad quieres...";
        }
    });
</script>
</body>
</html>
